# Greenhouse-powered employer registry for Seattle-area discovery.
#
# Slugs are the tenant part of the careers URL (boards.greenhouse.io/{slug}
# or job-boards.greenhouse.io/{slug}). The scraper hits
# `https://boards-api.greenhouse.io/v1/boards/{slug}/jobs?content=true`.
#
# Verified 2026-04-24 from the Seattle employer research agents
# (docs/seattle_employers_v1.yaml + v2.yaml). Extend by adding more slugs.

