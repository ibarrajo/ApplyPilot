# Seattle-area mega-corps & major employers (v3) — researched 2026-04-23.
#
# PURPOSE: Fills the systematic gap in v1+v2, which used startup-focused
# directories (Built In Seattle, VC portfolios, AngelList/Wellfound) and
# therefore systematically excluded household-name employers.
#
# Sources used for this list:
#   psbj        = Puget Sound Business Journal "Largest Employers" list
#   geekwire    = GeekWire "Top 100" companies
#   wa-commerce = Washington State Dept of Commerce major employers
#   wikipedia   = Wikipedia "Companies based in Seattle" category
#   direct-web  = Known public information / company careers pages
#   linkedin    = LinkedIn company directory (1000+ employees, Seattle area)
#
# All companies have physical offices within ~30 min of Lower Queen Anne (98119)
# by motorcycle, covering: Seattle, Bellevue, Redmond, Kirkland, SLU, Fremont,
# Ballard, Belltown, Issaquah, SeaTac, Renton, and nearby suburbs.
#
# Tier definitions (consistent with v1/v2):
#   1 = strong eng culture, interesting distributed-systems / AI-infra problems
#   2 = solid scale-up or established company, good stack
#   3 = large employer, mixed culture, worth applying anyway
#
# NOTE: Google and Meta are listed in v1 comments / v2 dedup list but never
# got full entries. They are included here with complete records.

diagnosis: |
  Three compounding biases caused v1+v2 to miss every household-name employer
  with a Seattle-area presence.

  SOURCE BIAS: Every research source was a startup-focused directory. Built In
  Seattle, AngelList/Wellfound, and the four VC portfolios (Madrona, PSL,
  Voyager, Flying Fish) are explicitly curated for venture-backed startups.
  Amazon doesn't list on Wellfound. Microsoft doesn't appear in Madrona's
  portfolio. Household names are systematically absent from these directories
  because they recruit through their own career portals, LinkedIn, and employee
  referrals — not startup job boards.

  INSTRUCTION BIAS (TIER FRAMING): The prompt used Temporal, Pulumi, Snowflake,
  and Databricks as "Tier 1 ideal" examples — all developer-tools scale-ups. The
  tier system implicitly ranked company size as a negative signal: "mixed
  culture" and "big-co" were used as Tier 3 descriptors, which the research
  agent correctly interpreted as low-priority. Amazon was mentioned as "(mixed)"
  in passing; Microsoft as "(big-co culture)." These parentheticals signaled
  "deprioritize" even if that wasn't the explicit intent.

  SENIORITY FILTER MISMATCH: The framing of "senior/staff backend" and
  "interesting distributed-systems problems" aligns better with Series B-D
  companies where a single engineer has outsized impact. Mega-corps post
  hundreds of senior roles across dozens of teams — many solving genuinely hard
  distributed-systems problems (AWS, Azure, Google Cloud, Stripe) — but the
  filter's cultural framing excluded them implicitly.

  IMPLICIT CULTURAL FILTER: The emphasis on "interesting engineering problems"
  and "strong eng culture" as prerequisites for inclusion created a bias toward
  companies with visible technical brands (Stripe, Databricks) and against
  those with consumer/retail brands (Amazon, Nordstrom, Costco). This conflated
  brand identity with engineering quality — a false equivalence, since Amazon
  SDE teams build some of the world's most complex distributed systems.

